#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
# AGP 9.0 disallows com.android.application + kotlinMultiplatform under the new
# built-in Kotlin/DSL. PillTime uses a single composeApp application module that
# is also a KMP module (see CLAUDE.md), so opt back into the legacy behavior.
android.builtInKotlin=false
android.newDsl=false